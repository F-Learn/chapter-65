<script>
    // Chapter 65: Management of Patients with Oncologic or Degenerative Neurologic Disorders – 39 questions (exact from document)
    const questions = [
        {
            id: 1,
            question: "1. A nurse is assessing a client with an acoustic neuroma who has been recently admitted to an oncology unit. What symptoms is the nurse likely to find during the initial assessment?",
            options: [
                "A. Loss of hearing, tinnitus, and vertigo",
                "B. Loss of vision, change in mental status, and hyperthermia",
                "C. Loss of hearing, increased sodium retention, and hypertension",
                "D. Loss of vision, headache, and tachycardia"
            ],
            correct: 0, // A
            rationale: "An acoustic neuroma is a tumor of the eighth cranial nerve, the cranial nerve most responsible for hearing and balance. The client with an acoustic neuroma usually experiences loss of hearing, tinnitus, and episodes of vertigo and staggering gait. Acoustic neuromas do not cause loss of vision, increased sodium retention, or tachycardia. (PTS:1 REF:p.2115)"
        },
        {
            id: 2,
            question: "2. A 25-year-old client with brain metastases is considering life expectancy after the client's most recent meeting with her oncologist. Based on the fact that the client is not receiving treatment for the brain metastases, what is the nurse's most appropriate action?",
            options: [
                "A. Promoting the client's functional status and ADLs",
                "B. Ensuring that the client receives adequate palliative care",
                "C. Ensuring that the family does not tell the client that the condition is terminal",
                "D. Promoting adherence to the prescribed medication regimen"
            ],
            correct: 1, // B
            rationale: "Clients with intracerebral metastases who are not treated have a steady downhill course with a limited survival time, whereas those who are treated may survive for slightly longer periods, but for most cure is not possible. Palliative care is thus necessary. This is a priority over promotion of function and the family should not normally withhold information from the client. Adherence to medications such as analgesics is important, but palliative care is a high priority. (PTS:1 REF:p.2118)"
        },
        {
            id: 3,
            question: "3. The nurse is writing a care plan for a client with brain metastases. The nurse decides that an appropriate nursing diagnosis is 'anxiety related to lack of control over the health circumstances.' In establishing this plan of care for the client, the nurse should include which intervention?",
            options: [
                "A. Antianxiety medications every 4 hours",
                "B. Family instruction on planning the client's care",
                "C. Encouragement to verbalize concerns related to the disease and its treatment",
                "D. Intensive therapy with the goal of distraction"
            ],
            correct: 2, // C
            rationale: "Clients need the opportunity to exercise some control over their situation. A sense of mastery can be gained as they learn to understand the disease and its treatment and how to deal with their feelings. Distraction and administering medications will not allow the client to gain control over anxiety. Delegating planning to the family will not help the client gain a sense of control and autonomy. (PTS:1 REF:p.2121)"
        },
        {
            id: 4,
            question: "4. The clinic nurse caring for a client with Parkinson disease notes that the client has been taking levodopa and carbidopa (Sinemet) for 7 years. For what common side effect should the nurse assess this client?",
            options: [
                "A. Pruritus",
                "B. Dyskinesia",
                "C. Lactose intolerance",
                "D. Diarrhea"
            ],
            correct: 1, // B
            rationale: "Within 5 to 10 years of taking levodopa, most clients develop a response to the medication characterized by dyskinesia (abnormal involuntary movements). Another potential complication of long-term dopaminergic medication use is neuroleptic malignant syndrome characterized by severe rigidity, stupor, and hyperthermia. Side effects of long-term Sinemet therapy are not pruritus, lactose intolerance, or diarrhea. (PTS:1 REF:p.2124)"
        },
        {
            id: 5,
            question: "5. The nurse is caring for a boy who has muscular dystrophy. When planning assistance with the client's ADLs, what goal should the nurse prioritize?",
            options: [
                "A. Promoting the client's recovery from the disease",
                "B. Maximizing the client's level of function",
                "C. Ensuring the client's adherence to treatment",
                "D. Fostering the family's participation in care"
            ],
            correct: 1, // B
            rationale: "Priority for the care of the child with muscular dystrophy is the need to maximize the client's level of function. Family participation is also important, but should be guided by this goal. Adherence is not a central goal, even though it is highly beneficial, and the disease is not curable. (PTS:1 REF:p.2132)"
        },
        {
            id: 6,
            question: "6. A 37-year-old client is brought to the clinic by the spouse because the client is experiencing loss of motor function and sensation. The health care provider suspects the client has a spinal cord tumor and hospitalizes the client for diagnostic testing. In light of the need to rule out spinal cord compression from a tumor, the nurse will most likely prepare the client for what test?",
            options: [
                "A. Anterior-posterior x-ray",
                "B. Ultrasound",
                "C. Lumbar puncture",
                "D. MRI"
            ],
            correct: 3, // D
            rationale: "The MRI scan is the most commonly used diagnostic procedure. It is the most sensitive diagnostic tool that is particularly helpful in detecting epidural spinal cord compression and vertebral bone metastases. (PTS:1 REF:p.2116)"
        },
        {
            id: 7,
            question: "7. A client with Parkinson disease is undergoing a swallowing assessment because the client has recently developed adventitious lung sounds. The client's nutritional needs should be met by what method?",
            options: [
                "A. Total parenteral nutrition (TPN)",
                "B. Provision of a low-residue diet",
                "C. Semisolid food with thick liquids",
                "D. Minced foods and a fluid restriction"
            ],
            correct: 2, // C
            rationale: "A semisolid diet with thick liquids is easier for a client with swallowing difficulties to consume than is a solid diet. Low-residue foods and fluid restriction are unnecessary and counterproductive to the client's nutritional status. The client's status does not warrant TPN until all other options have been ruled out. (PTS:1 REF:p.2127)"
        },
        {
            id: 8,
            question: "8. A client, diagnosed with cancer of the lung, has just been told the cancer has metastasized to the brain. What change in health status would the nurse attribute to the client's metastatic brain disease?",
            options: [
                "A. Chronic pain",
                "B. Respiratory distress",
                "C. Fixed pupils",
                "D. Personality changes"
            ],
            correct: 3, // D
            rationale: "Neurologic signs and symptoms include headache, gait disturbances, visual impairment, personality changes, altered mentation (memory loss and confusion), focal weakness, paralysis, aphasia, and seizures. Pain, respiratory distress, and fixed pupils are not among the more common neurologic signs and symptoms of metastatic brain disease. (PTS:1 REF:p.2118)"
        },
        {
            id: 9,
            question: "9. A client has just been diagnosed with Parkinson disease and the nurse is planning the client's subsequent care for the home setting. What nursing diagnosis should the nurse address when educating the client's family?",
            options: [
                "A. Risk for infection",
                "B. Impaired spontaneous ventilation",
                "C. Unilateral neglect",
                "D. Risk for injury"
            ],
            correct: 3, // D
            rationale: "Individuals with Parkinson disease face a significant risk for injury related to the effects of dyskinesia. Unilateral neglect is not characteristic of the disease, which affects both sides of the body. Parkinson disease does not directly constitute a risk for infection or impaired respiration. (PTS:1 REF:p.2124)"
        },
        {
            id: 10,
            question: "10. The nurse is caring for a client with Huntington disease who has been admitted to the hospital for treatment of malnutrition. What independent nursing action should be implemented in the client's plan of care?",
            options: [
                "A. Firmly redirect the client's head when feeding.",
                "B. Administer phenothiazines after each meal as prescribed.",
                "C. Encourage the client to keep his or her feeding area clean.",
                "D. Apply deep, gentle pressure around the client's mouth to aid swallowing."
            ],
            correct: 3, // D
            rationale: "Nursing interventions for a client who has inadequate nutritional intake should include the following: apply deep gentle pressure around the client's mouth to assist with swallowing, and administer phenothiazines prior to the client's meal as prescribed. The nurse should disregard the mess of the feeding area and treat the person with dignity. Stiffness and turning away by the client during feeding are uncontrollable choreiform movements and should not be interrupted. (PTS:1 REF:p.2130)"
        },
        {
            id: 11,
            question: "11. A client has been admitted to the neurologic unit for the treatment of a newly diagnosed brain tumor. The client has just exhibited seizure activity for the first time. What is the nurse's priority response to this event?",
            options: [
                "A. Identify the triggers that precipitated the seizure.",
                "B. Implement precautions to ensure the client's safety.",
                "C. Teach the client's family about the relationship between brain tumors and seizure activity.",
                "D. Ensure that the client is housed in a private room."
            ],
            correct: 1, // B
            rationale: "Clients with seizures are carefully monitored and protected from injury. Client safety is a priority over health education, even though this is appropriate and necessary. Specific triggers may or may not be evident; identifying these are not the highest priority. A private room is preferable, but not absolutely necessary. (PTS:1 REF:p.2118)"
        },
        {
            id: 12,
            question: "12. A client diagnosed with a pituitary adenoma has arrived on the neurologic unit. When planning the client's care, the nurse should be aware that the effects of the tumor will primarily depend on what variable?",
            options: [
                "A. Whether the tumor utilizes aerobic or anaerobic respiration",
                "B. The specific hormones secreted by the tumor",
                "C. The client's pre-existing health status",
                "D. Whether the tumor is primary or the result of metastasis"
            ],
            correct: 1, // B
            rationale: "Functioning pituitary tumors can produce one or more hormones normally produced by the anterior pituitary and the effects of the tumor depend largely on the identity of these hormones. This variable is more significant than the client's health status or whether the tumor is primary versus secondary. Anaerobic and aerobic respiration are not relevant. (PTS:1 REF:p.2114)"
        },
        {
            id: 13,
            question: "13. A client with a metastatic brain tumor of the frontal lobe experiences a generalized seizure for the first time. The nurse should prepare for what action?",
            options: [
                "A. Intubation",
                "B. STAT computed tomography (CT) health care provider",
                "C. A STAT MRI",
                "D. Administration of anticonvulsants"
            ],
            correct: 3, // D
            rationale: "Seizure activity necessitates anticonvulsants. In most cases, the development of seizure activity does not require immediate diagnostic imaging. Intubation is unnecessary except in cases of respiratory failure. (PTS:1 REF:p.2115)"
        },
        {
            id: 14,
            question: "14. The nurse in an extended care facility is planning the daily activities of a client with post-polio syndrome. The nurse recognizes the client will best benefit from physical therapy when it is scheduled at what time?",
            options: [
                "A. Immediately after meals",
                "B. In the morning",
                "C. Before bedtime",
                "D. In the early evening"
            ],
            correct: 1, // B
            rationale: "Important activities for clients with post-polio syndrome should be planned for the morning, as fatigue often increases in the afternoon and evening. (PTS:1 REF:p.2139)"
        },
        {
            id: 15,
            question: "15. A client newly diagnosed with a cervical disk herniation is receiving health education from the clinic nurse. What conservative management measures should the nurse teach the client to implement?",
            options: [
                "A. Perform active ROM exercises three times daily.",
                "B. Sleep on a firm mattress.",
                "C. Apply cool compresses to the back of the neck daily.",
                "D. Wear the cervical collar for at least 2 hours at a time."
            ],
            correct: 1, // B
            rationale: "Proper positioning on a firm mattress and bed rest for 1 to 2 days may bring dramatic relief from pain. The client may need to wear a cervical collar 24 hours a day during the acute phase of pain from a cervical disc herniation. Hot, moist compresses applied to the back of the neck will increase blood flow to the muscles and help relax the spastic muscles. (PTS:1 REF:p.2135)"
        },
        {
            id: 16,
            question: "16. A client has just returned to the unit from the PACU after surgery for a tumor within the spine. The client reports pain. When positioning the client for comfort and to reduce injury to the surgical site, the nurse will position to client in what position?",
            options: [
                "A. In the high Fowler position",
                "B. In a flat side-lying position",
                "C. In the Trendelenburg position",
                "D. In the reverse Trendelenburg position"
            ],
            correct: 1, // B
            rationale: "After spinal surgery, the bed is usually kept flat initially. The side-lying position is usually the most comfortable because this position imposes the least pressure on the surgical site. The Fowler position, Trendelenburg position, and reverse Trendelenburg position are inappropriate for this client because they would result in increased pain and complications. (PTS:1 REF:p.2122)"
        },
        {
            id: 17,
            question: "17. A client with amyotrophic lateral sclerosis (ALS) is being visited by the home health nurse who is creating a care plan. Which of the following nursing diagnoses is most likely for a client with this condition?",
            options: [
                "A. Chronic confusion",
                "B. Impaired urinary elimination",
                "C. Impaired verbal communication",
                "D. Bowel incontinence"
            ],
            correct: 2, // C
            rationale: "Impaired communication is an appropriate nursing diagnosis; the voice in clients with ALS assumes a nasal sound and articulation becomes so disrupted that speech is unintelligible. Intellectual function is marginally impaired in clients with late ALS. Usually, the anal and bladder sphincters are intact because the spinal nerves that control muscles of the rectum and urinary bladder are not affected. (PTS:1 REF:p.2132)"
        },
        {
            id: 18,
            question: "18. The nurse is caring for a client with a brain tumor who is experiencing symptoms due to compression and infiltration of normal tissue. The pathophysiologic changes that result can cause what manifestations? Select all that apply.",
            options: [
                "A. Intracranial hemorrhage",
                "B. Infection of cerebrospinal fluid",
                "C. Increased ICP",
                "D. Focal neurologic signs",
                "E. Altered pituitary function"

    let currentQuestion = 0;
    let selectedOption = null;
    let answers = Array(questions.length).fill(null);

    function loadQuestion() {
        const q = questions[currentQuestion];
        if (!q) return;

        const progress = ((currentQuestion + 1) / questions.length) * 100;
        document.getElementById('progressBar').style.width = `${progress}%`;
        document.getElementById('counter').textContent = `${currentQuestion + 1}/${questions.length}`;
        document.getElementById('questionNumber').textContent = q.id;

        document.getElementById('question').innerHTML = q.question;
        loadOptions(q);

        document.getElementById('feedback').style.display = 'none';
        document.getElementById('rationale').classList.remove('show');
        document.getElementById('cancelBtn').classList.remove('show');

        document.getElementById('prevBtn').disabled = currentQuestion === 0;
        const stored = answers[q.id - 1];
        document.getElementById('nextBtn').disabled = stored === null || stored === undefined;
        document.getElementById('nextBtn').textContent = currentQuestion >= questions.length - 1 ? 'Finish ➡️' : 'Next ➡️';
    }

    function loadOptions(q) {
        const container = document.getElementById('options');
        container.innerHTML = '';
        q.options.forEach((opt, idx) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerHTML = `<div class="option-letter">${String.fromCharCode(65 + idx)}</div><div>${opt}</div>`;
            div.onclick = () => selectOption(idx);
            container.appendChild(div);
        });

        const saved = answers[q.id - 1];
        if (saved !== null && saved !== undefined) {
            selectOption(saved, true);
        }
    }

    function selectOption(index, fromMemory = false) {
        const q = questions[currentQuestion];
        if (!fromMemory && selectedOption !== null) return;

        if (!fromMemory) {
            selectedOption = index;
            answers[q.id - 1] = index;
        }

        highlightSelected(index, q);
        showFeedback(index, q);
        document.getElementById('nextBtn').disabled = false;
        document.getElementById('cancelBtn').classList.add('show');
    }

    function highlightSelected(index, q) {
        const opts = document.querySelectorAll('.option');
        opts.forEach((opt, i) => opt.classList.remove('correct', 'incorrect'));

        const correctIndices = Array.isArray(q.correct) ? q.correct : [q.correct];
        if (Array.isArray(q.correct)) {
            correctIndices.forEach(ci => opts[ci]?.classList.add('correct'));
            if (!correctIndices.includes(index)) {
                opts[index]?.classList.add('incorrect');
            }
        } else {
            if (index === q.correct) {
                opts[index].classList.add('correct');
            } else {
                opts[index].classList.add('incorrect');
                opts[q.correct].classList.add('correct');
            }
        }
    }

    function showFeedback(index, q) {
        const fb = document.getElementById('feedback');
        const icon = document.getElementById('feedbackIcon');
        const text = document.getElementById('feedbackText');
        const rationaleDiv = document.getElementById('rationale');
        const rationaleP = document.getElementById('rationaleText');

        const correctIndices = Array.isArray(q.correct) ? q.correct : [q.correct];
        const isCorrect = correctIndices.includes(index);

        if (isCorrect) {
            fb.className = 'feedback correct';
            icon.textContent = '✅';
            text.textContent = 'CORRECT! Well done.';
        } else {
            fb.className = 'feedback incorrect';
            icon.textContent = '❌';
            const letters = correctIndices.map(c => String.fromCharCode(65 + c)).join(', ');
            text.textContent = `INCORRECT. The correct answer(s): ${letters}`;
        }

        fb.style.display = 'flex';
        rationaleP.innerHTML = q.rationale;
        rationaleDiv.classList.add('show');
    }

    function cancelSelection() {
        const q = questions[currentQuestion];
        selectedOption = null;
        answers[q.id - 1] = null;
        document.querySelectorAll('.option').forEach(opt => opt.classList.remove('correct', 'incorrect'));
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('rationale').classList.remove('show');
        document.getElementById('cancelBtn').classList.remove('show');
        document.getElementById('nextBtn').disabled = true;
    }

    function nextCard() {
        if (currentQuestion < questions.length - 1) {
            currentQuestion++;
            selectedOption = null;
            loadQuestion();
        } else {
            currentQuestion = 0;
            loadQuestion();
        }
    }

    function previousCard() {
        if (currentQuestion > 0) {
            currentQuestion--;
            const q = questions[currentQuestion];
            selectedOption = answers[q.id - 1];
            loadQuestion();
        }
    }

    // keyboard shortcuts
    document.addEventListener('keydown', function(e) {
        if (e.key >= '1' && e.key <= '4') selectOption(parseInt(e.key)-1);
        else if (e.key >= 'a' && e.key <= 'd') selectOption(e.key.charCodeAt(0)-97);
        else if (e.key >= 'A' && e.key <= 'D') selectOption(e.key.charCodeAt(0)-65);
        else if (e.key === 'ArrowLeft' && !document.getElementById('prevBtn').disabled) previousCard();
        else if (e.key === 'ArrowRight' && !document.getElementById('nextBtn').disabled) nextCard();
        else if (e.key === 'Escape' && document.getElementById('cancelBtn').classList.contains('show')) cancelSelection();
    });

    loadQuestion();
</script>
